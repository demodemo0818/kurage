name: Release (Windows)

# v* タグの push で Windows ポータブル zip をビルドし、GitHub Release に添付する。
# Android (AAB) / Web のリリースはローカルで行う運用のまま (RELEASING.md 参照)。
# workflow_dispatch は動作確認用 (Release は作らず artifact に保存するだけ)。
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  windows-zip:
    name: Build Windows zip
    runs-on: windows-latest
    timeout-minutes: 40

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 実 Firebase 設定は git 管理外 (ci.yml と同じ方式)。Windows は実行時に
      # Firebase 初期化を skip するので、ダミーの example で機能的にも問題ない。
      - name: Provide dummy Firebase config
        run: |
          Copy-Item lib/firebase_options.dart.example lib/firebase_options.dart
          Copy-Item android/app/google-services.json.example android/app/google-services.json

      # ローカルと合わせて pin (ci.yml と同時に更新すること)。
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.9"
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      # build → VC++ ランタイム同梱 → dist/kurage-vX.Y.Z[-pre]-windows.zip 生成。
      # windows ランナーは VS (C++ / ATL) + vswhere + NuGet 設定済みなので
      # ローカルと同じスクリプトがそのまま動く。
      # CL: ランナーの VS2026 (MSVC 14.51) は <experimental/coroutine> 使用を
      # エラーにするため、一部プラグイン (audioplayers_windows / local_auth_windows /
      # permission_handler_windows) がビルド不能。STL 公式の抑制マクロを全コンパイルに
      # 適用して回避する (プラグイン側が C++20 <coroutine> に移行したら外せる)。
      - name: Build & package zip
        env:
          CL: /D_SILENCE_EXPERIMENTAL_COROUTINE_DEPRECATION_WARNINGS
        run: pwsh tool/package_windows.ps1

      - name: Create GitHub Release & upload zip
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "${{ github.ref_name }}"
          # zip + インストーラー (setup.exe)。万一 setup が無くても zip だけで続行
          $assets = @(Get-ChildItem dist/kurage-*-windows.zip, dist/kurage-*-setup.exe |
            ForEach-Object FullName)
          if (-not $assets) { throw 'dist に成果物がありません' }
          $pre = if ($tag -match '-') { @('--prerelease') } else { @() }
          $notes = "release_notes/$tag.md"
          gh release view $tag *> $null
          if ($LASTEXITCODE -eq 0) {
            # 再実行などで Release が既にある場合は成果物の差し替えのみ
            gh release upload $tag @assets --clobber
          } elseif (Test-Path $notes) {
            gh release create $tag @assets --title $tag --notes-file $notes @pre
          } else {
            gh release create $tag @assets --title $tag --generate-notes @pre
          }

      # GitHub Release 作成に成功した後だけ実行。DISCORD_WEBHOOK_URL 未設定
      # (fork や secret 未登録) なら黙ってスキップする (CI を失敗させない)。
      - name: Notify Discord
        if: ${{ success() && startsWith(github.ref, 'refs/tags/v') }}
        env:
          GH_TOKEN: ${{ github.token }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          if (-not $env:DISCORD_WEBHOOK_URL) {
            Write-Host "DISCORD_WEBHOOK_URL 未設定のため Discord 通知をスキップします"
            exit 0
          }
          $tag = "${{ github.ref_name }}"
          $release = gh release view $tag --json url,body,name | ConvertFrom-Json

          # Discord embed description の上限は 4096 文字。安全マージンを取って切る。
          $body = $release.body
          if ($body.Length -gt 3800) {
            $body = $body.Substring(0, 3800) + "`n...(省略。全文はリンク先を参照)"
          }

          $payload = @{
            content = "🚀 Kurage $($release.name) をリリースしました"
            embeds  = @(@{
              title       = $release.name
              url         = $release.url
              description = $body
              color       = 5793266
            })
          } | ConvertTo-Json -Depth 5

          $bytes = [System.Text.Encoding]::UTF8.GetBytes($payload)
          Invoke-RestMethod -Uri $env:DISCORD_WEBHOOK_URL -Method Post -ContentType 'application/json; charset=utf-8' -Body $bytes

      - name: Upload artifact (manual run)
        if: "!startsWith(github.ref, 'refs/tags/v')"
        uses: actions/upload-artifact@v4
        with:
          name: windows-zip
          path: |
            dist/*-windows.zip
            dist/*-setup.exe
